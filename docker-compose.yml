services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: fra-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

  frontend:
    build:
      context: ./frontend

    container_name: fra-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules